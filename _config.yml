title: "Dürr Dental Knowledge Base"
description: "Documentation indépendante et publiquement sourcée des produits Dürr Dental (imagerie, conventionnel, hygiène et chimie). Initiative personnelle, sources strictement publiques."
baseurl: "/durr-dental-knowledge-base"
url: "https://grzybicki.github.io"

lang: fr
locale: fr_FR

# Identité publication
author:
  name: "Jozef Grzybicki"
  role: "Salarié Dürr Dental France (rôle commercial) — initiative personnelle indépendante, non officielle"

# Twitter / OG par défaut (jekyll-seo-tag)
twitter:
  card: summary

logo: ""
social:
  name: "Dürr Dental Knowledge Base"
  links:
    - https://github.com/Grzybicki/durr-dental-knowledge-base

# Jekyll engine
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Pas de thème externe : layout custom dans _layouts/default.html
# (assure cohérence HTML + lang + SEO + JSON-LD)

# Plugins GitHub Pages safelist
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# SEO / LLM metadata defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      lang: "fr"

# Exclude
exclude:
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - LICENSE
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - drafts/
  - _local/
  - vendor/
